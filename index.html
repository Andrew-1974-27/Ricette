<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef AI - Il Tuo Sous-Chef Personale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .skeleton { animation: pulse 1.5s infinite; background: #e5e7eb; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-amber-50 min-h-screen text-gray-800 p-4 md:p-8">

    <main class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-amber-900 mb-2">🧑‍🍳 Chef AI</h1>
            <p class="text-amber-700">Dimmi cosa hai in frigo, e io creerò una magia per te.</p>
        </header>

        <section class="bg-white rounded-3xl shadow-xl p-6 md:p-8 border-2 border-amber-100">
            <div class="mb-6">
                <label class="block text-sm font-bold text-amber-900 mb-2">Ingredienti nel frigo (separati da virgola)</label>
                <textarea id="ingredients" class="w-full h-32 p-4 rounded-2xl border-2 border-amber-200 focus:border-amber-500 outline-none transition" placeholder="Es: uova, farina, latte, burro, parmigiano..."></textarea>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <label class="flex items-center space-x-2 text-sm text-amber-900 font-medium cursor-pointer">
                    <input type="checkbox" id="diet-veg" class="w-4 h-4 text-amber-600"> <span>Vegetariano</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-amber-900 font-medium cursor-pointer">
                    <input type="checkbox" id="diet-vegan" class="w-4 h-4 text-amber-600"> <span>Vegano</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-amber-900 font-medium cursor-pointer">
                    <input type="checkbox" id="diet-gf" class="w-4 h-4 text-amber-600"> <span>Senza Glutine</span>
                </label>
                <label class="flex items-center space-x-2 text-sm text-amber-900 font-medium cursor-pointer">
                    <input type="checkbox" id="diet-lf" class="w-4 h-4 text-amber-600"> <span>Senza Lattosio</span>
                </label>
            </div>

            <button id="generateBtn" onclick="generateRecipe()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 rounded-2xl transition transform hover:scale-[1.01] active:scale-[0.99]">
                Crea il mio piatto!
            </button>
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-xl text-sm font-medium"></div>
        </section>

        <div id="resultContainer" class="hidden mt-10">
            <div id="recipeDisplay" class="bg-white rounded-3xl shadow-lg p-6 md:p-8 border border-amber-100"></div>
        </div>
    </main>

    <script>
        // CONFIGURAZIONE API: Sostituisci con la tua chiave reale. 
        // ATTENZIONE: Non condividere questo file se contiene la chiave.
        const API_KEY = 'INSERISCI_QUI_LA_TUA_GEMINI_API_KEY';

        function showMessage(msg, isError = true) {
            const errDiv = document.getElementById('errorMessage');
            errDiv.innerText = msg;
            errDiv.classList.remove('hidden', 'bg-red-100', 'bg-green-100');
            errDiv.classList.add(isError ? 'bg-red-100' : 'bg-green-100');
            errDiv.classList.remove('text-red-700', 'text-green-700');
            errDiv.classList.add(isError ? 'text-red-700' : 'text-green-700');
        }

        async function generateRecipe() {
            const ingredients = document.getElementById('ingredients').value;
            const errDiv = document.getElementById('errorMessage');
            
            if (!ingredients) {
                showMessage('Per favore, inserisci almeno un ingrediente!');
                return;
            }
            errDiv.classList.add('hidden');

            const filters = [];
            if (document.getElementById('diet-veg').checked) filters.push('Vegetariano');
            if (document.getElementById('diet-vegan').checked) filters.push('Vegano');
            if (document.getElementById('diet-gf').checked) filters.push('Senza Glutine');
            if (document.getElementById('diet-lf').checked) filters.push('Senza Lattosio');

            const container = document.getElementById('resultContainer');
            const recipeDiv = document.getElementById('recipeDisplay');
            const btn = document.getElementById('generateBtn');

            container.classList.remove('hidden');
            recipeDiv.innerHTML = '<div class="space-y-4"><div class="skeleton h-8 w-1/3 rounded"></div><div class="skeleton h-4 w-full rounded"></div></div>';
            btn.disabled = true;
            btn.innerText = 'Lo Chef sta cucinando...';

            try {
                const prompt = `Sei uno chef stellato. Ingredienti: "${ingredients}". Preferenze: ${filters.length > 0 ? filters.join(', ') : 'Nessuna'}. Rispondi ESCLUSIVAMENTE in formato JSON con chiavi: "title", "description", "quantities" (array), "instructions" (array), "nutrition" (object: {calories, proteins, carbs, fats}), "winePairing" (object: {name, description, reason}).`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const recipeText = data.candidates[0].content.parts[0].text;
                const json = JSON.parse(recipeText.replace(/```json/g, '').replace(/```/g, ''));

                recipeDiv.innerHTML = `
                    <h2 class="text-3xl font-bold text-amber-900 mb-2">${json.title}</h2>
                    <p class="text-gray-600 mb-6 italic">${json.description}</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6 text-center text-xs">
                        <div class="bg-amber-100 p-2 rounded-lg"><strong>${json.nutrition.calories}</strong><br>Kcal</div>
                        <div class="bg-amber-100 p-2 rounded-lg"><strong>${json.nutrition.proteins}</strong><br>Prot</div>
                        <div class="bg-amber-100 p-2 rounded-lg"><strong>${json.nutrition.carbs}</strong><br>Carb</div>
                        <div class="bg-amber-100 p-2 rounded-lg"><strong>${json.nutrition.fats}</strong><br>Grassi</div>
                    </div>
                    <div class="space-y-6">
                        <div><h3 class="font-bold text-amber-800 mb-2">Quantità</h3><ul class="list-disc ml-4">${json.quantities.map(q => `<li>${q}</li>`).join('')}</ul></div>
                        <div><h3 class="font-bold text-amber-800 mb-2">Preparazione</h3><ol class="list-decimal ml-4 space-y-2">${json.instructions.map(i => `<li>${i}</li>`).join('')}</ol></div>
                        <div class="p-4 bg-amber-900 text-amber-50 rounded-2xl">
                            <h3 class="font-bold mb-1">🍷 Sommelier AI: ${json.winePairing.name}</h3>
                            <p class="text-sm opacity-90 italic">${json.winePairing.description}</p>
                            <p class="text-xs mt-2 pt-2 border-t border-amber-700">${json.winePairing.reason}</p>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                showMessage('Errore nella generazione. Controlla la tua API Key.');
                recipeDiv.innerHTML = '';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Crea il mio piatto!';
            }
        }
    </script>
</body>
</html>
